name: Crash Report
description: Report a crash or hang
labels: ["bug", "crash"]
body:
  - type: markdown
    attributes:
      value: |
        Sorry you experienced a crash! Please provide as much detail as possible.

  - type: input
    id: arbor-version
    attributes:
      label: Arbor Version
      description: Which version of Arbor are you running?
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS 15 (Sequoia)
        - macOS 14 (Sonoma)
        - macOS 13 (Ventura)
        - Other (specify below)
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS Version Details
      description: Exact OS version
      placeholder: "e.g. macOS 15.3.1"

  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options:
        - Apple Silicon (M1/M2/M3/M4)
        - Intel x86_64
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What were you doing when the crash occurred?
    validations:
      required: true

  - type: textarea
    id: frequency
    attributes:
      label: Frequency
      description: Does this happen every time, or intermittently?
      placeholder: "e.g. Every time I open a specific repo, or randomly after ~10 minutes"
    validations:
      required: true

  - type: textarea
    id: crash-log
    attributes:
      label: Crash Log
      description: Paste any crash log or backtrace if available
      render: text
    validations:
      required: false
